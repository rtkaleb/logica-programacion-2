<!-- Página para hacer un conversor de temperatura -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css"> <!--Enlazo el archivo CSS para darle estilo a la página -->
    <title>Conversor de temperaturas</title>
</head>
<body>
     <div class="contenedor"> <!--Defino la clase para estilizarlo en CSS -->
        <h1>Conversor de Temperatura</h1>
        <p>Ingrese la temperatura en Celsius:</p>
        <input type="number" id="celsius"> <!--Este es el input donde usuario ingresará temperatura en celsius -->
        <button onclick="convertir()">Convertir</button> <!--Botón para generar resultado -->
        <p id="resultado"></p> <!--Aquí se mostrará el resultado de la conversión -->
    </div>

    <script src="script.js"></script> <!--Enlazo el archivo JavaScript para que funcione la conversión -->
</body>
</html>
